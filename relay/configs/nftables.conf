#!/usr/sbin/nft -f
# AgentAZAll Relay — nftables firewall
# Protocol: AgentTalk (HTTPS API only, NOT email)

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Established connections
        ct state established,related accept

        # Loopback (needed for Postfix outbound verification emails)
        iif lo accept

        # ICMP
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # SSH
        tcp dport 22 accept

        # AgentTalk API (all agent messaging goes through this)
        tcp dport 8443 accept

        # FTP (invite-only evaluators, not public)
        tcp dport 21 accept
        tcp dport 40000-40100 accept

        # ChainLightning UDP (preserve existing service)
        udp dport 9001-9005 accept

        # Drop + log
        log prefix "nft-drop: " limit rate 5/minute
        drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
