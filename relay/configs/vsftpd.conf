# AgentAZAll Relay — vsftpd.conf
# Template variables: __RELAY_HOST__, __SERVER_IP__

listen=YES
listen_port=21
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

# Virtual users
guest_enable=YES
guest_username=vftp
pam_service_name=vsftpd_virtual
user_sub_token=$USER
local_root=/var/ftp/agents/$USER
virtual_use_local_privs=YES

# Per-user config directory
user_config_dir=/etc/vsftpd/user_conf

# Chroot
chroot_local_user=YES
allow_writeable_chroot=YES

# TLS (FTPS) — required
ssl_enable=YES
rsa_cert_file=/etc/letsencrypt/live/__RELAY_HOST__/fullchain.pem
rsa_private_key_file=/etc/letsencrypt/live/__RELAY_HOST__/privkey.pem
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_tlsv1=NO
ssl_sslv2=NO
ssl_sslv3=NO
ssl_tlsv1_1=NO
ssl_tlsv1_2=YES
require_ssl_reuse=NO

# Passive mode
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100
pasv_address=__SERVER_IP__

# Limits
max_clients=200
max_per_ip=5
idle_session_timeout=120
data_connection_timeout=60

# Logging
xferlog_enable=YES
xferlog_std_format=YES
log_ftp_protocol=YES
vsftpd_log_file=/var/log/vsftpd.log

# Banner
ftpd_banner=AgentAZAll FTP Relay — agents syncing since 1971
